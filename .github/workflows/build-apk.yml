name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Pre-configure Bubblewrap
        run: |
          # Accept Android SDK licenses
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

          # Write bubblewrap config
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"/usr/local/lib/android/sdk\"}" > ~/.bubblewrap/config.json

          # Patch bubblewrap to skip SDK validation (line 32)
          NPM_GLOBAL=$(npm root -g)
          TOOLS_JS=$(find "$NPM_GLOBAL" -name "AndroidSdkTools.js" 2>/dev/null | head -1)
          echo "Patching: $TOOLS_JS"
          sed -i 's/(await AndroidSdkTools\.validatePath(config\.androidSdkPath))\.unwrap();//' "$TOOLS_JS"
          echo "Patch applied — line 32 now:"
          sed -n '32p' "$TOOLS_JS"

      - name: Install Android SDK components
        run: |
          SDKMANAGER=/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager
          yes | $SDKMANAGER \
            "build-tools;34.0.0" \
            "build-tools;33.0.2" \
            "build-tools;33.0.1" \
            "platforms;android-34" \
            "platforms;android-33" \
            "platform-tools" > /dev/null 2>&1 || true
          echo "Installed build-tools:"
          ls /usr/local/lib/android/sdk/build-tools/

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/portfoplus.keystore

      - name: Build APK
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          which expect || sudo apt-get install -y expect
          cat > /tmp/build.exp << 'EOF'
          set timeout -1
          spawn bubblewrap build --skipPwaValidation
          expect {
            "regenerate" { send "Y\r"; exp_continue }
            "versionName" { send "1.0.0\r"; exp_continue }
            "versionCode" { send "1\r"; exp_continue }
            eof
          }
          catch wait result
          exit [lindex $result 3]
          EOF
          expect /tmp/build.exp

      - name: Debug - show generated project on failure
        if: failure()
        run: |
          echo "=== Root build.gradle ==="
          cat build.gradle 2>/dev/null || echo "not found"
          echo "=== app/build.gradle ==="
          cat app/build.gradle 2>/dev/null || echo "not found"
          echo "=== Gradle wrapper version ==="
          cat gradle/wrapper/gradle-wrapper.properties 2>/dev/null || echo "not found"
          echo "=== Last Gradle error log ==="
          find ~/.gradle/daemon -name "*.log" 2>/dev/null | sort | tail -1 | xargs tail -100 2>/dev/null || true

      - name: Find APK
        run: find . -name "*.apk" -o -name "*.aab" 2>/dev/null

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: portfoplus-apk
          path: |
            **/*.apk
            **/*.aab
          retention-days: 30
