name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Pre-configure Bubblewrap
        run: |
          echo "=== cmdline-tools contents ==="
          ls -la /usr/local/lib/android/sdk/cmdline-tools/
          echo "=== build-tools contents ==="
          ls -la /usr/local/lib/android/sdk/build-tools/
          echo "=== checking sdkmanager ==="
          find /usr/local/lib/android/sdk/cmdline-tools -name "sdkmanager" 2>/dev/null

          # Create cmdline-tools/latest symlink if needed
          CMDLINE_TOOLS="/usr/local/lib/android/sdk/cmdline-tools"
          if [ ! -d "$CMDLINE_TOOLS/latest" ]; then
            VERSIONED=$(ls "$CMDLINE_TOOLS" | head -1)
            echo "Creating symlink: $VERSIONED -> latest"
            ln -s "$CMDLINE_TOOLS/$VERSIONED" "$CMDLINE_TOOLS/latest"
          else
            echo "cmdline-tools/latest already exists"
            ls "$CMDLINE_TOOLS/latest/bin/"
          fi

          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"/usr/local/lib/android/sdk\"}" > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/portfoplus.keystore

      - name: Build APK
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: bubblewrap build --skipPwaValidation

      - name: Find APK
        run: find . -name "*.apk" -o -name "*.aab" 2>/dev/null

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: portfoplus-apk
          path: |
            **/*.apk
            **/*.aab
          retention-days: 30
