name: Build Android APK

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/portfoplus.keystore

      - name: Initialize TWA project
        run: |
          bubblewrap init \
            --manifest=https://josephyas.github.io/portfoplus/manifest.json \
            --directory=twa-build \
            --skipPwaValidation \
            --jdkPath="$JAVA_HOME"

      - name: Build APK
        working-directory: twa-build
        run: |
          bubblewrap build \
            --keystorePath=/tmp/portfoplus.keystore \
            --keystoreKeyAlias=portfoplus \
            --keystorePassword="${{ secrets.KEYSTORE_PASSWORD }}" \
            --keyPassword="${{ secrets.KEY_PASSWORD }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: portfoplus-apk
          path: |
            twa-build/app-release-signed.apk
            twa-build/app-release-bundle.aab
          retention-days: 30
